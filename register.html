<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open Account | NorthBridge Bank</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="register-page">
    <div class="register-header">
        <h1>Open Your Account</h1>
        <p>Join thousands of customers banking with NorthBridge.</p>
    </div>
    <div class="register-card">
        <div class="steps">
            <div class="step active">1</div>
            <div class="line"></div>
            <div class="step">2</div>
            <div class="line"></div>
            <div class="step">3</div>
        </div>
        <h2>Create Your Profile</h2>
        <form id="registerForm">
            <div class="input-box">
                <label>Full Name</label>
                <input type="text" id="fullname" required>
            </div>
            <div class="input-box">
                <label>Email Address</label>
                <input type="email" id="email" required>
            </div>
            <div class="input-box">
                <label>Phone Number</label>
                <input type="tel" id="phone" required>
            </div>
            <div class="input-box">
                <label>Password</label>
                <input type="password" id="password" required>
            </div>
            <div class="input-box">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" required>
            </div>
           <button type="button" id="registerBtn" onclick="alert('WORKING')">
    Continue
</button>
        </form>
        <div class="secure-box">
            🔒 Your information is protected with bank-grade security.
        </div>
        <div class="login-link">
            Already have an account?
            <a href="login.html">Sign In</a>
        </div>
    </div>
</div>
    
<script>

</script>

 <script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
document.getElementById("registerBtn")
.addEventListener("click", function () {

    const fullname =
    document.getElementById("fullname").value;

    const email =
    document.getElementById("email").value;

    alert("NAME = " + fullname);

    alert("EMAIL = " + email);

});
</script>

    <h1>TEST VERSION 7</h1>
</body>
</html>
