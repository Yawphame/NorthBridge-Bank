<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open Account | Scarborough Demo Bank</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="register-page">
    <div class="register-header">
        <h1>Open Your Demo Account</h1>
        <p><p>Create a demo account to explore the banking experience.</p></p>
    </div>
    <div class="register-card">
        <div class="steps">
            <div class="step active">1</div>
            <div class="line"></div>
            <div class="step">2</div>
            <div class="line"></div>
            <div class="step">3</div>
        </div>
        <h2>Create Your Profile</h2>
        <form id="registerForm">
            <div class="input-box">
                <label>Full Name</label>
                <input type="text" id="fullname" required>
            </div>
            <div class="input-box">
                <label>Email Address</label>
                <input type="email" id="email" required>
            </div>
            <div class="input-box">
                <label>Phone Number</label>
                <input type="tel" id="phone" required>
            </div>
            <div class="input-box">
                <label>Password</label>
                <input type="password" id="password" required>
            </div>
            <div class="input-box">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" required>
            </div>
           <button type="button" id="registerBtn" onclick="alert('WORKING')">
    Continue
</button>
        </form>
        <div class="secure-box">
            🔒 Your information is protected with bank-grade security.
        </div>
        <div class="login-link">
            Already have an account?
            <a href="login.html">Demo Login</a>
        </div>
    </div>
</div>
    
<script>

 <script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseClient = window.supabase.createClient(
  "https://ivebxspiqaaanwgjgzqr.supabase.co",
  "sb_publishable_WpVmOL5d2M0JseiIPHTLYA_AYZcqCWU"
);
document.getElementById("registerBtn").addEventListener("click", async () => {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const confirmPassword = document.getElementById("confirmPassword").value;
  if (!email || !password) {
    alert("Please fill all required fields");
    return;
  }
  if (password !== confirmPassword) {
    alert("Passwords do not match");
    return;
  }
  alert("Sending signup request...");
  try {
    const { data, error } = await supabaseClient.auth.signUp({
      email,
      password
    });
    if (error) {
      alert("SUPABASE ERROR: " + error.message);
      return;
    }
    alert("SUCCESS");
    console.log(data);
  } catch (err) {
    alert("CATCH ERROR: " + err.message);
    console.error(err);
  }
});
</script>

</html>
