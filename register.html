    <div class="register-header">
        <h1>Open Your Account</h1>
        <p>Join thousands of customers banking with NorthBridge.</p>
    </div>

    <div class="register-card">

        <div class="steps">
            <div class="step active">1</div>
            <div class="line"></div>
            <div class="step">2</div>

            <div class="step">3</div>

        <h2>Create Your Profile</h2>

        <form id="registerForm">

            <div class="input-box">
                <label>Full Name</label>
                <input type="text" id="fullname" placeholder="John Smith">
            </div>

            <div class="input-box">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="john@email.com">
            </div>

            <div class="input-box">
                <label>Phone Number</label>
                <input type="tel" id="phone" placeholder="+44 7XXX XXX XXX">
            </div>

            <div class="input-box">
                <label>Password</label>
                <input type="password" id="password" placeholder="Create a password">
            </div>

            <div class="input-box">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm password">
            </div>

            <button type="submit">
                Continue
            </button>

        </form>

        <div class="secure-box">
            🔒 Your information is protected with bank-grade security.
        </div>

        <div class="login-link">
            Already have an account?
            <a href="login.html">Sign In</a>
        </div>

    </div>


</div>
