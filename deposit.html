<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit Funds | NorthBridge Bank</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="transfer-page">
<div class="transfer-header">
    <a href="dashboard.html" class="back-btn">← Back</a>
    <h1>Deposit Funds</h1>
    <p>
        Add money securely to your NorthBridge account.
    </p>
</div>
<div class="transfer-card">
    <div class="balance-card">
        <p>Current Balance</p>
        <h1>£1,000.00</h1>
        <span>Account No: NBB100001</span>
    </div>
    <div class="input-box">
        <label>Deposit Amount (£)</label>
        <input
            type="number"
            placeholder="Enter deposit amount"
        >
    </div>
    <div class="input-box">
        <label>Payment Method</label>
        <select class="deposit-select">
            <option>Debit Card</option>
            <option>Bank Transfer</option>
            <option>Credit Card</option>
        </select>
    </div>
    <div class="input-box">
        <label>Reference</label>
        <input
            type="text"
            placeholder="Optional reference"
        >
    </div>
    <button class="transfer-btn">
        Deposit Funds
    </button>
    <div class="secure-box">
        🔒 Deposits are encrypted and protected by advanced banking security.
    </div>
</div>
</div>
</body>
</html>
