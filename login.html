<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NorthBridge Bank - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-page">

    <div class="brand-section">
        <h1>NorthBridge</h1>
        <p>Secure Banking for Modern Britain</p>
    </div>

    <div class="login-card">

        <h2>Welcome Back</h2>
        <span>Sign in to continue</span>

        <form id="loginForm" novalidate>

            <div class="input-box">
                <label for="email">Email Address</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email"
                    placeholder="name@email.com"
                    required
                    autocomplete="email"
                >
                <span class="error-message" id="emailError"></span>
            </div>

            <div class="input-box">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password"
                    placeholder="••••••••"
                    required
                    autocomplete="current-password"
                    minlength="6"
                >
                <span class="error-message" id="passwordError"></span>
            </div>

            <!-- Error Alert -->
            <div class="alert alert-error" id="loginError" style="display: none;"></div>

            <!-- Loading Spinner -->
            <div id="loadingContainer" style="display: none; text-align: center; margin: 20px 0;">
                <div class="loading-spinner"></div>
                <p style="margin-top: 10px; color: #64748b;">Signing in...</p>
            </div>

            <a href="forgot-password.html" class="forgot-link">
                Forgot Password?
            </a>

            <button type="submit" id="loginBtn" class="login-submit-btn">
                Sign In
            </button>

        </form>

        <div class="divider">
            <span>OR</span>
        </div>

        <a href="register.html" class="create-account">
            Open New Account
        </a>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// Simple test - remove all Supabase stuff temporarily
document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();
    alert("✅ Button works! JS is running.");
});
</script>

</body>
</html>
