<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NorthBridge Bank - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-page">

    <div class="brand-section">
        <h1>NorthBridge</h1>
        <p>Secure Banking for Modern Britain</p>
    </div>

    <div class="login-card">

        <h2>Welcome Back</h2>
        <span>Sign in to continue</span>

        <form id="loginForm" novalidate>

            <div class="input-box">
                <label for="email">Email Address</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email"
                    placeholder="name@email.com"
                    required
                    autocomplete="email"
                >
                <span class="error-message" id="emailError"></span>
            </div>

            <div class="input-box">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password"
                    placeholder="••••••••"
                    required
                    autocomplete="current-password"
                    minlength="6"
                >
                <span class="error-message" id="passwordError"></span>
            </div>

            <!-- Error Alert -->
            <div class="alert alert-error" id="loginError" style="display: none;"></div>

            <!-- Loading Spinner -->
            <div id="loadingContainer" style="display: none; text-align: center; margin: 20px 0;">
                <div class="loading-spinner"></div>
                <p style="margin-top: 10px; color: #64748b;">Signing in...</p>
            </div>

            <a href="forgot-password.html" class="forgot-link">
                Forgot Password?
            </a>

            <button type="submit" id="loginBtn" class="login-submit-btn">
                Sign In
            </button>

        </form>

        <div class="divider">
            <span>OR</span>
        </div>

        <a href="register.html" class="create-account">
            Open New Account
        </a>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
document.addEventListener("DOMContentLoaded", function() {

    // Supabase setup
    let supabase = null;
    try {
        const supabaseUrl = "https://ivebxspiqaaanwgjgzqr.supabase.co";
        const supabaseKey = "sb_publishable_WpVmOL5d2M0JseiIPHTLYA_AYZcqCWU";
        supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
        console.log("✅ Supabase initialized");
    } catch (err) {
        console.error("❌ Supabase init failed:", err);
    }

    // DOM elements
    const loginForm = document.getElementById("loginForm");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const loginBtn = document.getElementById("loginBtn");
    const emailError = document.getElementById("emailError");
    const passwordError = document.getElementById("passwordError");
    const loginError = document.getElementById("loginError");
    const loadingContainer = document.getElementById("loadingContainer");

    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    // Clear errors while typing
    emailInput.addEventListener("input", () => emailError.textContent = "");
    passwordInput.addEventListener("input", () => passwordError.textContent = "");

    function validateEmail(email) {
        if (!email) {
            emailError.textContent = "Email address is required";
            return false;
        }
        if (!emailRegex.test(email)) {
            emailError.textContent = "Please enter a valid email address";
            return false;
        }
        emailError.textContent = "";
        return true;
    }

    function validatePassword(password) {
        if (!password) {
            passwordError.textContent = "Password is required";
            return false;
        }
        if (password.length < 6) {
            passwordError.textContent = "Password must be at least 6 characters";
            return false;
        }
        passwordError.textContent = "";
        return true;
    }

    // Main form handler
    loginForm.addEventListener("submit", async function(e) {
        e.preventDefault();

        // Clear previous errors
        loginError.style.display = "none";
        loginError.textContent = "";

        const email = emailInput.value.trim();
        const password = passwordInput.value;

        if (!validateEmail(email) || !validatePassword(password)) {
            return;
        }

        // Loading state
        loadingContainer.style.display = "block";
        loginBtn.disabled = true;
        loginBtn.textContent = "Signing in...";

        try {
            if (!supabase) throw new Error("Supabase not ready");

            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password
            });

            if (error) {
                loginError.textContent = error.message || "Invalid credentials";
                loginError.style.display = "block";
            } else if (data.user) {
                alert("🎉 Login Successful!");
                // window.location.href = "/dashboard.html";  // Change when you add dashboard
            }
        } catch (err) {
            console.error("Login error:", err);
            loginError.textContent = "Something went wrong. Please try again.";
            loginError.style.display = "block";
        } finally {
            loadingContainer.style.display = "none";
            loginBtn.disabled = false;
            loginBtn.textContent = "Sign In";
        }
    });
});
</script>

</body>
</html>
