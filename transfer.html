<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfer Money | NorthBridge Bank</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="transfer-page">

    <div class="transfer-header">
        <a href="dashboard.html" class="back-btn">← Back</a>
        <h1>Transfer Money</h1>
        <p>Send funds securely and instantly.</p>
    </div>

    <div class="transfer-card">

        <div class="input-box">
            <label>Recipient Name</label>
            <input type="text" placeholder="Enter recipient name">
        </div>

        <div class="input-box">
            <label>Account Number</label>
            <input type="text" placeholder="Enter account number">
        </div>

        <div class="input-box">
            <label>Sort Code</label>
            <input type="text" placeholder="00-00-00">
        </div>

        <div class="input-box">
            <label>Amount (£)</label>
            <input type="number" placeholder="0.00">
        </div>

        <div class="input-box">
            <label>Reference</label>
            <input type="text" placeholder="Payment reference">
        </div>

        <button class="transfer-btn">
            Send Transfer
        </button>

    </div>

</div>

</body>
</html>
