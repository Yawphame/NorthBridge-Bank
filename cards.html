<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cards | NorthBridge Bank</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="cards-page">
<div class="transfer-header">
    <a href="dashboard.html" class="back-btn">
        ← Back
    </a>
    <h1>My Cards</h1>
    <p>
        Manage your NorthBridge cards securely.
    </p>
</div>
<div class="premium-card">
    <span class="card-brand">
        NORTHBRIDGE PREMIUM
    </span>
    <div class="card-chip"></div>
    <h2>
        **** **** **** 1048
    </h2>
    <div class="card-info">
        <div>
            <small>Card Holder</small>
            <p>JUNIOR</p>
        </div>
        <div>
            <small>Valid Thru</small>
            <p>12/29</p>
        </div>
    </div>
    <div class="visa-logo">
        VISA
    </div>
</div>
<div class="card-options">
    <div class="option-card">
        💳 Freeze Card
    </div>
    <div class="option-card">
        🔒 Change PIN
    </div>
    <div class="option-card">
        📱 Add To Wallet
    </div>
    <div class="option-card">
        📄 Card Details
    </div>
</div>
</div>
</body>
</html>
